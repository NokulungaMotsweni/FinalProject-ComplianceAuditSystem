{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="panel" style="width: 100%; max-width: 420px;">
        <p class="panel-title">Compliance Monitor</p>
        <h2 class="fw-600 mb-1" style="font-size: 1.4rem;">Sign in</h2>
        <p class="text-muted mb-4" style="font-size: 0.875rem;">Enter your credentials to access the audit system.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label fw-500">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" autofocus>
            </div>
            <div class="mb-4">
                <label for="id_password" class="form-label fw-500">Password</label>
                <input type="password" name="password" id="id_password" class="form-control">
            </div>

            {% if form.errors %}
                <div class="alert alert-danger mb-3">
                    Invalid username or password.
                </div>
            {% endif %}

            <button type="submit" class="btn btn-run w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
