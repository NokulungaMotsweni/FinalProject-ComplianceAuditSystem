{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Compliance Monitor{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Compliance Monitor</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="{% url 'upload_dataset' %}">Uploads</a>
            <a class="nav-link" href="/results/">Results</a>
            <a class="nav-link" href="{% url 'review_queue' %}">Review Queue</a>
            <a class="nav-link" href="{% url 'evaluation' %}">Evaluation</a>

        </div>
    </div>
</nav>

<div class="container-fluid py-4 py-4">
     {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} mb-3">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{% static 'js/app.js' %}"></script>
</body>
</html>
